<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะเรือ | AQUATHRILL Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Kanit',sans-serif;background:#0a1628;color:#fff;min-height:100vh}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:rgba(255,255,255,.03);border-right:1px solid rgba(255,255,255,.06);padding:24px 0;z-index:100}
        .sidebar .brand{padding:0 24px 24px;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#00d4ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.6);text-decoration:none;font-size:.95rem;transition:.2s;border-left:3px solid transparent}
        .sidebar nav a:hover,.sidebar nav a.active{background:rgba(0,212,255,.08);color:#fff;border-left-color:#00d4ff}
        .sidebar nav a i{width:20px;text-align:center}
        .sidebar .logout-btn{position:absolute;bottom:24px;left:24px;right:24px;padding:12px;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.2);border-radius:12px;color:#ff5252;text-align:center;cursor:pointer;font-family:inherit;font-size:.9rem}
        .main-content{margin-left:240px;padding:32px}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
        .top-bar h2{font-size:1.5rem}
        .legend{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
        .legend-item{display:flex;align-items:center;gap:6px;font-size:.85rem;color:rgba(255,255,255,.6)}
        .legend-dot{width:14px;height:14px;border-radius:4px}
        .legend-dot.avail{background:#00c853}
        .legend-dot.limited{background:#ffab00}
        .legend-dot.booked{background:#ff3d71}
        .legend-dot.past{background:rgba(255,255,255,.12)}
        .boat-tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .boat-tab{padding:10px 24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;cursor:pointer;font-family:inherit;font-size:.9rem;transition:.2s}
        .boat-tab.active{background:rgba(0,212,255,.15);border-color:#00d4ff;color:#00d4ff}
        .month-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px}
        .month-nav button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.2s}
        .month-nav button:hover{background:rgba(0,212,255,.15)}
        .month-label{font-size:1.3rem;font-weight:700;min-width:200px;text-align:center}
        .cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;text-align:center}
        .cal-header div{font-size:.8rem;color:rgba(255,255,255,.4);padding:8px}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
        .cal-day{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:.2s;min-height:80px}
        .cal-day:hover:not(.empty){background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.3)}
        .cal-day.empty{background:none;border:none;cursor:default}
        .cal-day.past{opacity:.5;cursor:pointer}
        .cal-day.past:hover{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.3)}
        .cal-day.past .day-num::after{content:'(ผ่านแล้ว)';font-size:.5rem;color:rgba(255,255,255,.4);display:block;font-weight:400}
        .cal-day .day-num{font-size:1rem;font-weight:600;margin-bottom:4px}
        .cal-day .slots{display:flex;flex-direction:column;gap:2px}
        .slot-dot{font-size:.55rem;padding:2px 6px;border-radius:4px;display:inline-block}
        .slot-dot.s-available{background:rgba(0,200,83,.2);color:#00c853}
        .slot-dot.s-limited{background:rgba(255,171,0,.2);color:#ffab00}
        .slot-dot.s-booked{background:rgba(255,61,113,.2);color:#ff3d71}
        .cal-day.today{box-shadow:0 0 0 2px #00d4ff}
        /* Slot Edit Modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,5,20,.85);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
        .modal-overlay.active{display:flex}
        .modal-box{background:#0d2847;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
        .modal-box h3{margin-bottom:20px;font-size:1.2rem}
        .slot-section{margin-bottom:16px;background:rgba(255,255,255,.03);border-radius:12px;padding:14px}
        .slot-section-title{font-size:.85rem;font-weight:600;margin-bottom:10px;color:#00d4ff;display:flex;align-items:center;gap:6px}
        .slot-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:8px;flex-wrap:wrap}
        .slot-row .slot-label{font-size:.82rem;min-width:60px;color:rgba(255,255,255,.7)}
        .slot-input-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
        .slot-input-group label{font-size:.7rem;color:rgba(255,255,255,.4)}
        .slot-input-group input{width:60px;padding:6px 8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#fff;font-family:inherit;font-size:.85rem;text-align:center}
        .slot-info{font-size:.7rem;color:rgba(255,255,255,.35);margin-top:2px}
        .modal-actions{display:flex;gap:10px;margin-top:20px}
        .modal-actions button{flex:1;padding:12px;border:none;border-radius:10px;font-family:inherit;cursor:pointer;font-size:.9rem;font-weight:600}
        .btn-save{background:linear-gradient(135deg,#00b4ff,#0066cc);color:#fff}
        .btn-close{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)}
        @media(max-width:768px){.sidebar{width:60px}.sidebar .brand,.sidebar nav a span,.sidebar .logout-btn span{display:none}.sidebar nav a{justify-content:center;padding:12px}.main-content{margin-left:60px;padding:16px}.cal-day{padding:6px 4px;min-height:60px}.cal-day .day-num{font-size:.8rem}.slot-dot{font-size:.45rem;padding:1px 3px}}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">AQUATHRILL</div>
        <nav>
            <a href="index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            <a href="bookings.html"><i class="fas fa-calendar-check"></i> <span>การจอง</span></a>
            <a href="availability.html" class="active"><i class="fas fa-ship"></i> <span>สถานะเรือ</span></a>
            <a href="boat-types.html"><i class="fas fa-anchor"></i> <span>จัดการเรือ</span></a>
            <a href="agent-pricing.html"><i class="fas fa-user-tie"></i> <span>ราคาตัวแทน</span></a>
            <a href="promotions.html"><i class="fas fa-bullhorn"></i> <span>โปรโมชั่น</span></a>
            <a href="gallery.html"><i class="fas fa-images"></i> <span>แกลเลอรี่</span></a>
            <a href="reviews.html"><i class="fas fa-star"></i> <span>รีวิว Google</span></a>
            <!-- ซ่อนเมนูชำระเงิน (ระบบ Payso ตั้งค่าเสร็จแล้ว) — เปิดคืนได้โดยลบ comment ออก:
            <a href="payment-settings.html"><i class="fas fa-credit-card"></i> <span>ชำระเงิน</span></a>
            -->
            <a href="change-password.html"><i class="fas fa-key"></i> <span>เปลี่ยนรหัสผ่าน</span></a>
            <a href="../" target="_blank"><i class="fas fa-external-link-alt"></i> <span>ดูเว็บไซต์</span></a>
        </nav>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> <span>ออกจากระบบ</span></button>
    </aside>

    <div class="main-content">
        <div class="top-bar"><h2><i class="fas fa-ship" style="color:#00d4ff"></i> จัดการสถานะเรือ</h2></div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot avail"></div> ว่าง</div>
            <div class="legend-item"><div class="legend-dot limited"></div> เหลือน้อย</div>
            <div class="legend-item"><div class="legend-dot booked"></div> เต็ม</div>
            <div class="legend-item"><div class="legend-dot past"></div> ผ่านแล้ว</div>
        </div>
        <div class="boat-tabs" id="boat-tabs"></div>
        <div class="month-nav">
            <button onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
            <div class="month-label" id="month-label"></div>
            <button onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="cal-header"><div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div></div>
        <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Slot Edit Modal -->
    <div class="modal-overlay" id="slot-modal">
        <div class="modal-box">
            <h3><i class="fas fa-edit" style="color:#00d4ff"></i> แก้ไขสถานะ — <span id="modal-date"></span></h3>
            <div id="slot-rows"></div>
            <div class="modal-actions">
                <button class="btn-close" onclick="closeSlotModal()">ยกเลิก</button>
                <button class="btn-save" onclick="saveSlots()"><i class="fas fa-save"></i> บันทึก</button>
            </div>
        </div>
    </div>

    <script>
    const API='/api';
    const MONTHS=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    const today=new Date();
    let curMonth=today.getMonth()+1, curYear=today.getFullYear(), curBoat='all';
    let availData={}, pastSet=new Set(), boatTypesList=[];

    (async()=>{
        const r=await fetch(API+'/admin-auth.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'check'}),credentials:'include'});
        const d=await r.json();
        if(!d.authenticated) location.href='index.html';
        else { await loadBoatTypes(); loadCalendar(); }
    })();

    async function loadBoatTypes(){
        try {
            const r=await fetch(API+'/boat-types-v2.php?_t='+Date.now(),{credentials:'include',cache:'no-store'});
            const d=await r.json();
            boatTypesList=d.boat_types||[];
            renderBoatTabs();
        } catch(e){ boatTypesList=[{id:'12ft',name:'SEASTORM 12ft'},{id:'14ft',name:'SEASTORM 14ft'}]; renderBoatTabs(); }
    }

    function renderBoatTabs(){
        const el=document.getElementById('boat-tabs');
        let html='<button class="boat-tab'+(curBoat==='all'?' active':'')+'" onclick="setBoat(\'all\',this)">ทั้งหมด</button>';
        boatTypesList.forEach(bt=>{
            html+='<button class="boat-tab'+(curBoat===bt.id?' active':'')+'" onclick="setBoat(\''+bt.id+'\',this)">'+bt.name+'</button>';
        });
        el.innerHTML=html;
    }

    function setBoat(b,el){curBoat=b;document.querySelectorAll('.boat-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');loadCalendar();}
    function changeMonth(dir){curMonth+=dir;if(curMonth>12){curMonth=1;curYear++}if(curMonth<1){curMonth=12;curYear--}loadCalendar();}

    async function loadCalendar(){
        document.getElementById('month-label').textContent=MONTHS[curMonth-1]+' '+(curYear+543);
        const r=await fetch(API+'/availability.php?month='+curMonth+'&year='+curYear+'&boat='+curBoat,{credentials:'include'});
        const d=await r.json();
        availData=d.details||{};
        pastSet=new Set(d.pastDates||[]);
        renderCal(d);
    }

    function slotClass(info){
        if(!info) return 's-available';
        if(info.available<=0) return 's-booked';
        if(info.available<info.total) return 's-limited';
        return 's-available';
    }

    function renderCal(data){
        const grid=document.getElementById('cal-grid');
        const firstDay=new Date(curYear,curMonth-1,1).getDay();
        const daysInMonth=new Date(curYear,curMonth,0).getDate();
        const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
        let html='';
        for(let i=0;i<firstDay;i++) html+='<div class="cal-day empty"></div>';
        const boats=curBoat==='all'?boatTypesList.map(b=>b.id):[curBoat];
        for(let d=1;d<=daysInMonth;d++){
            const dateStr=`${curYear}-${String(curMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isPast=pastSet.has(dateStr);
            const isToday=dateStr===todayStr;
            const detail=availData[dateStr]||{};
            let slotsHtml='';
            boats.forEach(bt=>{
                const slots=detail[bt]||{morning:{total:1,booked:0,blocked:0,available:1},afternoon:{total:1,booked:0,blocked:0,available:1}};
                const prefix=curBoat==='all'?(bt+' '):'';
                ['morning','afternoon'].forEach(sl=>{
                    const info=slots[sl]||{total:1,booked:0,blocked:0,available:1};
                    const cls=slotClass(info);
                    const label=sl==='morning'?'เช้า':'บ่าย';
                    slotsHtml+=`<span class="slot-dot ${cls}">${prefix}${label} ${info.available}/${info.total}</span>`;
                });
            });
            html+=`<div class="cal-day${isPast?' past':''}${isToday?' today':''}" onclick="openSlotModal('${dateStr}')">
                <div class="day-num">${d}</div>
                <div class="slots">${slotsHtml}</div>
            </div>`;
        }
        grid.innerHTML=html;
    }

    let editDate='';
    function openSlotModal(dateStr){
        editDate=dateStr;
        document.getElementById('modal-date').textContent=dateStr;
        const detail=availData[dateStr]||{};
        const boats=curBoat==='all'?boatTypesList:boatTypesList.filter(b=>b.id===curBoat);
        let html='';
        boats.forEach(bt=>{
            const slots=detail[bt.id]||{morning:{total:parseInt(bt.total_boats),booked:0,blocked:0,available:parseInt(bt.total_boats)},afternoon:{total:parseInt(bt.total_boats),booked:0,blocked:0,available:parseInt(bt.total_boats)}};
            html+=`<div class="slot-section">
                <div class="slot-section-title"><i class="fas fa-ship"></i> ${bt.name} (ปกติ: ${bt.total_boats} ลำ)</div>`;
            ['morning','afternoon'].forEach(sl=>{
                const info=slots[sl]||{total:parseInt(bt.total_boats),booked:0,blocked:0,available:parseInt(bt.total_boats)};
                const slLabel=sl==='morning'?'🌅 รอบเช้า':'🌇 รอบบ่าย';
                html+=`<div class="slot-row">
                    <span class="slot-label">${slLabel}</span>
                    <div class="slot-input-group">
                        <div><label>จำนวนลำ</label><input type="number" id="t-${bt.id}-${sl}" value="${info.total}" min="0"></div>
                        <div><label>ปิดรับ</label><input type="number" id="b-${bt.id}-${sl}" value="${info.blocked}" min="0"></div>
                    </div>
                </div>
                <div class="slot-info">จองแล้ว: ${info.booked} | เหลือ: ${info.available} ลำ</div>`;
            });
            html+=`</div>`;
        });
        document.getElementById('slot-rows').innerHTML=html;
        document.getElementById('slot-modal').classList.add('active');
    }

    function closeSlotModal(){document.getElementById('slot-modal').classList.remove('active')}

    async function saveSlots(){
        const boats=curBoat==='all'?boatTypesList:boatTypesList.filter(b=>b.id===curBoat);
        const promises=[];
        boats.forEach(bt=>{
            ['morning','afternoon'].forEach(sl=>{
                const total=parseInt(document.getElementById(`t-${bt.id}-${sl}`).value);
                const blocked=parseInt(document.getElementById(`b-${bt.id}-${sl}`).value);
                // Determine status
                let status = 'available';
                if (blocked >= total) status = 'blocked';
                promises.push(fetch(API+'/availability.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({boat_type:bt.id,date:editDate,time_slot:sl,status:status,total_boats:total,blocked_boats:blocked}),credentials:'include'}));
            });
        });
        await Promise.all(promises);
        closeSlotModal();
        loadCalendar();
    }

    async function doLogout(){
        await fetch(API+'/admin-auth.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'logout'}),credentials:'include'});
        location.href='index.html';
    }
    </script>
</body>
</html>
