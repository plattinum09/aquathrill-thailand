<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ราคาตัวแทน | AQUATHRILL Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Kanit',sans-serif;background:#0a1628;color:#fff;min-height:100vh}
        .sidebar{position:fixed;left:0;top:0;width:220px;height:100vh;background:#0d2847;padding:20px 0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06);z-index:100}
        .sidebar .brand{text-align:center;font-size:1.3rem;font-weight:800;letter-spacing:2px;padding:10px 20px 30px;background:linear-gradient(135deg,#00d4ff,#00ff94);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.5);text-decoration:none;font-size:.9rem;transition:all .2s}
        .sidebar nav a:hover,.sidebar nav a.active{color:#fff;background:rgba(0,212,255,.08)}
        .sidebar nav a.active{border-right:3px solid #00d4ff}
        .sidebar nav a i{width:20px;text-align:center}
        .logout-btn{margin:20px;padding:10px;background:rgba(255,61,113,.1);border:1px solid rgba(255,61,113,.2);border-radius:10px;color:#ff3d71;font-family:inherit;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
        .main-content{margin-left:220px;padding:30px}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
        .top-bar h2{font-size:1.5rem}

        /* Toggle Switch */
        .toggle-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px 24px;margin-bottom:24px}
        .toggle-row .toggle-info h3{font-size:1rem;font-weight:600;margin-bottom:4px}
        .toggle-row .toggle-info p{font-size:.82rem;color:rgba(255,255,255,.45)}
        .toggle-switch{position:relative;width:52px;height:28px;flex-shrink:0}
        .toggle-switch input{opacity:0;width:0;height:0}
        .toggle-slider{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:28px;cursor:pointer;transition:.3s}
        .toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:4px;top:4px;background:#fff;border-radius:50%;transition:.3s}
        .toggle-switch input:checked + .toggle-slider{background:linear-gradient(135deg,#00b4ff,#00c853)}
        .toggle-switch input:checked + .toggle-slider:before{transform:translateX(24px)}

        /* Boat price cards */
        .pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
        .price-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;transition:border-color .3s}
        .price-card:hover{border-color:rgba(201,168,106,.3)}
        .price-card-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
        .price-card-header i{font-size:1.3rem;color:#e8c98a}
        .price-card-header h3{font-size:1.05rem;font-weight:600}
        .price-card-header .badge{background:rgba(201,168,106,.12);color:#e8c98a;padding:3px 10px;border-radius:20px;font-size:.72rem}
        .price-compare{display:flex;gap:12px;margin-bottom:16px}
        .price-compare .p-item{flex:1;text-align:center;padding:12px;border-radius:12px;background:rgba(255,255,255,.03)}
        .price-compare .p-item label{display:block;font-size:.72rem;color:rgba(255,255,255,.4);margin-bottom:4px}
        .price-compare .p-item .p-val{font-size:1.05rem;font-weight:700}
        .p-normal .p-val{color:rgba(255,255,255,.5);text-decoration:line-through}
        .p-agent .p-val{color:#e8c98a}
        .p-save{flex:0 0 auto;text-align:center;padding:12px;border-radius:12px;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.12)}
        .p-save label{display:block;font-size:.7rem;color:rgba(255,255,255,.4);margin-bottom:4px}
        .p-save .p-val{font-size:1rem;font-weight:700;color:#00c853}
        .price-input-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:4px 16px;transition:border-color .2s}
        .price-input-wrap:focus-within{border-color:#e8c98a;box-shadow:0 0 0 3px rgba(201,168,106,.12)}
        .price-input-wrap .currency{font-size:1rem;font-weight:600;color:rgba(255,255,255,.4)}
        .price-input-wrap input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:1.25rem;font-weight:700;font-family:'Kanit',sans-serif;padding:10px 0}

        /* Save button */
        .btn-save{display:inline-flex;align-items:center;gap:10px;padding:13px 32px;background:linear-gradient(135deg,#c9a86a,#e8c98a);border:none;border-radius:14px;color:#0a1628;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;margin-bottom:36px}
        .btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,106,.35)}
        .btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none}

        /* Section header */
        .section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
        .section-header h2{font-size:1.1rem;font-weight:700}
        .section-header i{color:#00b4ff}
        .section-header .badge-count{background:rgba(255,171,0,.15);color:#ffd54f;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}

        /* Slip filter tabs */
        .filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
        .filter-tab{padding:7px 18px;border-radius:24px;font-size:.8rem;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);cursor:pointer;transition:all .3s;font-family:'Kanit',sans-serif}
        .filter-tab:hover{border-color:rgba(0,180,255,.35);color:#fff}
        .filter-tab.active{background:linear-gradient(135deg,#00b4ff,#0066cc);border-color:transparent;color:#fff}

        /* Slip cards */
        .slip-grid{display:grid;gap:14px}
        .slip-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;display:flex;gap:16px;align-items:flex-start;transition:border-color .3s}
        .slip-card:hover{border-color:rgba(255,255,255,.15)}
        .slip-img{width:90px;height:70px;border-radius:10px;object-fit:cover;border:1px solid rgba(255,255,255,.1);flex-shrink:0;cursor:pointer;transition:opacity .2s}
        .slip-img:hover{opacity:.8}
        .slip-info{flex:1;min-width:0}
        .slip-info .booking-id{font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:4px}
        .slip-info .agent-name{font-size:.95rem;font-weight:600;margin-bottom:2px}
        .slip-info .customer{font-size:.82rem;color:rgba(255,255,255,.5)}
        .slip-info .details{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
        .slip-info .detail-tag{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;color:rgba(255,255,255,.45);background:rgba(255,255,255,.04);padding:3px 10px;border-radius:8px}
        .slip-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
        .slip-actions .btn-approve{padding:8px 16px;background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.2);border-radius:10px;color:#69f0ae;font-family:'Kanit',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
        .slip-actions .btn-approve:hover{background:rgba(0,200,83,.25)}
        .slip-actions .btn-reject{padding:8px 16px;background:rgba(255,61,113,.1);border:1px solid rgba(255,61,113,.2);border-radius:10px;color:#ff6b8a;font-family:'Kanit',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
        .slip-actions .btn-reject:hover{background:rgba(255,61,113,.22)}
        .status-badge{display:inline-block;padding:4px 12px;border-radius:8px;font-size:.72rem;font-weight:600}
        .status-badge.pending{background:rgba(255,171,0,.15);color:#ffd54f}
        .status-badge.approved{background:rgba(0,200,83,.15);color:#69f0ae}
        .status-badge.rejected{background:rgba(255,61,113,.12);color:#ff6b8a}

        /* Slip image lightbox */
        .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
        .lightbox.active{display:flex}
        .lightbox img{max-width:100%;max-height:90vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .lightbox-close{position:fixed;top:20px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .lightbox-close:hover{background:rgba(255,61,113,.4)}

        .empty-state{text-align:center;padding:40px;color:rgba(255,255,255,.3)}
        .empty-state i{font-size:2.5rem;display:block;margin-bottom:12px}

        .toast{position:fixed;top:24px;right:24px;background:#0d2847;border:1px solid rgba(0,200,83,.3);color:#00c853;padding:14px 22px;border-radius:14px;font-size:.88rem;display:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.3);align-items:center;gap:9px}
        .toast.show{display:flex}
        .toast.error{border-color:rgba(255,61,113,.3);color:#ff6b8a}

        @media(max-width:768px){
            .sidebar{width:60px}
            .sidebar .brand,.sidebar nav a span,.sidebar .logout-btn span{display:none}
            .sidebar nav a{justify-content:center;padding:14px}
            .main-content{margin-left:60px;padding:16px}
            .pricing-grid{grid-template-columns:1fr}
            .slip-card{flex-direction:column}
            .slip-actions{flex-direction:row;width:100%}
            .slip-actions button{flex:1}
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">AQUATHRILL</div>
        <nav>
            <a href="/admin/index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            <a href="/admin/bookings.html"><i class="fas fa-calendar-check"></i> <span>การจอง</span></a>
            <a href="/admin/availability.html"><i class="fas fa-ship"></i> <span>สถานะเรือ</span></a>

            <a href="/admin/boat-types.html"><i class="fas fa-anchor"></i> <span>จัดการเรือ</span></a>
            <a href="/admin/agent-pricing.html" class="active"><i class="fas fa-user-tie"></i> <span>ราคาตัวแทน</span></a>
            <a href="/admin/promotions.html"><i class="fas fa-bullhorn"></i> <span>โปรโมชั่น</span></a>
            <a href="/admin/gallery.html"><i class="fas fa-images"></i> <span>แกลเลอรี่</span></a>
            <a href="/admin/reviews.html"><i class="fas fa-star"></i> <span>รีวิว Google</span></a>
            <!-- ซ่อนเมนูชำระเงิน (ระบบ Payso ตั้งค่าเสร็จแล้ว) — เปิดคืนได้โดยลบ comment ออก:
            <a href="/admin/payment-settings.html"><i class="fas fa-credit-card"></i> <span>ชำระเงิน</span></a>
            -->
            <a href="/admin/change-password.html"><i class="fas fa-key"></i> <span>เปลี่ยนรหัสผ่าน</span></a>
            <a href="../" target="_blank"><i class="fas fa-external-link-alt"></i> <span>ดูเว็บไซต์</span></a>
        </nav>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> <span>ออกจากระบบ</span></button>
    </aside>

    <div class="main-content">
        <div class="top-bar">
            <h2><i class="fas fa-user-tie" style="color:#e8c98a"></i> ราคาตัวแทน</h2>
        </div>

        <!-- Toggle -->
        <div class="toggle-row">
            <div class="toggle-info">
                <h3><i class="fas fa-toggle-on" style="color:#e8c98a;margin-right:8px"></i>เปิดใช้ราคาพิเศษสำหรับตัวแทน</h3>
                <p>เมื่อเปิด ตัวแทนจะเห็นราคาที่ตั้งไว้แทนราคาปกติ และสามารถจอง+ชำระเงินในหน้าของตัวแทนได้</p>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-enabled">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- Pricing Cards — generated dynamically from API -->
        <div class="pricing-grid" id="pricing-grid">
            <div style="text-align:center;padding:40px;color:rgba(255,255,255,.3);grid-column:1/-1"><i class="fas fa-circle-notch fa-spin"></i> กำลังโหลด...</div>
        </div>

        <button class="btn-save" id="btn-save" onclick="saveSettings()">
            <i class="fas fa-save"></i> บันทึกการตั้งค่า
        </button>

    </div>

    <div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toast-msg"></span></div>

    <script>
    const API = '/api';
    let normalPrices = {};
    let boatKeys = [];

    // Auth check
    (async () => {
        const r = await fetch(API + '/admin-auth.php', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({action:'check'}), credentials:'include'
        });
        const d = await r.json();
        if (!d.authenticated) { location.href = 'index.html'; return; }
        loadAll();
    })();

    async function loadAll() {
        try {
            // Fetch boat types to build cards dynamically
            const btR = await fetch(API + '/boat-types-v2.php?_t=' + Date.now(), {credentials:'include', cache:'no-store'});
            const btD = await btR.json();
            const boats = btD.boat_types || [];

            // Build pricing cards
            const grid = document.getElementById('pricing-grid');
            boatKeys = [];
            let cardsHtml = '';
            boats.forEach(bt => {
                boatKeys.push(bt.id);
                normalPrices[bt.id] = parseInt(bt.price) || 0;
                cardsHtml += `<div class="price-card">
                    <div class="price-card-header">
                        <i class="fas fa-ship"></i>
                        <h3>${bt.name}</h3>
                        <span class="badge">2-${bt.max_guests} คน</span>
                    </div>
                    <div class="price-compare">
                        <div class="price-compare p-item p-normal">
                            <label>ราคาปกติ</label>
                            <div class="p-val" id="normal-price-${bt.id}">฿${Number(bt.price).toLocaleString('th-TH')}</div>
                        </div>
                        <div class="price-compare p-item p-agent">
                            <label>ราคาตัวแทน</label>
                            <div class="p-val" id="display-agent-${bt.id}">฿-</div>
                        </div>
                        <div class="p-save">
                            <label>ส่วนลด</label>
                            <div class="p-val" id="discount-${bt.id}">-</div>
                        </div>
                    </div>
                    <div class="price-input-wrap">
                        <span class="currency">฿</span>
                        <input type="number" id="agent-price-${bt.id}" placeholder="${Math.round(bt.price * 0.85)}" min="0" step="100"
                               oninput="updateDiscount('${bt.id}')">
                    </div>
                </div>`;
            });
            grid.innerHTML = cardsHtml;

            // Fetch agent pricing settings
            const r = await fetch(API + '/agent-pricing.php');
            const d = await r.json();
            const ap = d.agent_pricing || {};

            document.getElementById('toggle-enabled').checked = !!ap.enabled;

            boatKeys.forEach(k => {
                const agentP = ap[k]?.price ?? Math.round(normalPrices[k] * 0.85);
                const el = document.getElementById('agent-price-' + k);
                if (el) {
                    el.value = agentP;
                    updateDiscount(k);
                }
            });
        } catch(e) { console.error(e); }
    }

    function updateDiscount(key) {
        const agentP = parseInt(document.getElementById('agent-price-' + key)?.value) || 0;
        const normalP = normalPrices[key] || 0;
        const saved = normalP - agentP;
        const pct = normalP > 0 ? Math.round((saved / normalP) * 100) : 0;

        const displayEl = document.getElementById('display-agent-' + key);
        if (displayEl) displayEl.textContent = '฿' + agentP.toLocaleString('th-TH');
        const discEl = document.getElementById('discount-' + key);
        if (discEl) {
            if (saved > 0) {
                discEl.textContent = pct + '%';
                discEl.style.color = '#00c853';
            } else if (saved < 0) {
                discEl.textContent = '+' + Math.abs(pct) + '%';
                discEl.style.color = '#ff6b8a';
            } else {
                discEl.textContent = '0%';
                discEl.style.color = 'rgba(255,255,255,.4)';
            }
        }
    }

    async function saveSettings() {
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';

        const payload = {
            enabled: document.getElementById('toggle-enabled').checked
        };
        boatKeys.forEach(k => {
            payload[k] = { price: parseInt(document.getElementById('agent-price-' + k)?.value) || 0 };
        });

        try {
            const r = await fetch(API + '/agent-pricing.php', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(payload), credentials:'include'
            });
            const d = await r.json();
            if (d.success) {
                showToast('บันทึกสำเร็จ!');
            } else {
                showToast(d.error || 'เกิดข้อผิดพลาด', true);
            }
        } catch(e) { showToast('บันทึกไม่สำเร็จ', true); }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> บันทึกการตั้งค่า';
    }

    function showToast(msg, isError=false) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').textContent = msg;
        t.className = 'toast show' + (isError?' error':'');
        setTimeout(() => t.classList.remove('show'), 3500);
    }

    async function doLogout() {
        await fetch(API + '/admin-auth.php', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({action:'logout'}), credentials:'include'
        });
        location.href = 'index.html';
    }
    </script>
</body>
</html>
