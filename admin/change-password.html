<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <title>เปลี่ยนรหัสผ่าน | AQUATHRILL Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Kanit',sans-serif;background:#0a1628;color:#fff;min-height:100vh}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:rgba(255,255,255,.03);border-right:1px solid rgba(255,255,255,.06);padding:24px 0;z-index:100}
        .sidebar .brand{padding:0 24px 24px;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#00d4ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.6);text-decoration:none;font-size:.95rem;transition:.2s;border-left:3px solid transparent}
        .sidebar nav a:hover,.sidebar nav a.active{background:rgba(0,212,255,.08);color:#fff;border-left-color:#00d4ff}
        .sidebar nav a i{width:20px;text-align:center}
        .sidebar .logout-btn{position:absolute;bottom:24px;left:24px;right:24px;padding:12px;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.2);border-radius:12px;color:#ff5252;text-align:center;cursor:pointer;font-family:inherit;font-size:.9rem;transition:.2s}
        .sidebar .logout-btn:hover{background:rgba(255,80,80,.2)}
        .main-content{margin-left:240px;padding:32px;max-width:560px}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:12px}
        .top-bar h2{font-size:1.6rem}
        .settings-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;margin-bottom:24px}
        .settings-section h3{font-size:1.15rem;margin-bottom:20px;display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}
        .settings-section h3 i{color:#00d4ff;font-size:1.1rem}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-size:.85rem;color:rgba(255,255,255,.6);margin-bottom:6px;font-weight:500}
        .pw-wrap{position:relative}
        .form-group input{width:100%;padding:12px 44px 12px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:1rem;font-family:inherit;outline:none;transition:.3s}
        .form-group input:focus{border-color:#00d4ff;background:rgba(0,212,255,.08)}
        .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);cursor:pointer;background:none;border:none;font-size:1rem;padding:4px}
        .pw-toggle:hover{color:#00d4ff}
        .pw-hint{font-size:.78rem;color:rgba(255,255,255,.4);margin-top:6px}
        .field-error{font-size:.8rem;color:#ff5252;margin-top:6px;display:none}
        .btn{padding:12px 28px;border:none;border-radius:12px;font-family:inherit;font-weight:600;cursor:pointer;font-size:.95rem;transition:.3s;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:linear-gradient(135deg,#00b4ff,#0066cc);color:#fff}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,100,255,.3)}
        .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
        .toast{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:12px;font-weight:600;z-index:999;transform:translateX(400px);transition:.4s;font-size:.9rem}
        .toast.show{transform:translateX(0)}
        .toast.success{background:#00c853;color:#fff}
        .toast.error{background:#ff5252;color:#fff}
        @media(max-width:768px){.sidebar{width:60px;padding:16px 0}.sidebar .brand,.sidebar nav a span,.sidebar .logout-btn span{display:none}.sidebar nav a{justify-content:center;padding:12px}.main-content{margin-left:60px;padding:16px}}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">AQUATHRILL</div>
        <nav>
            <a href="/admin/index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            <a href="/admin/bookings.html"><i class="fas fa-calendar-check"></i> <span>การจอง</span></a>
            <a href="/admin/availability.html"><i class="fas fa-ship"></i> <span>สถานะเรือ</span></a>
            <a href="/admin/boat-types.html"><i class="fas fa-anchor"></i> <span>จัดการเรือ</span></a>
            <a href="/admin/agent-pricing.html"><i class="fas fa-user-tie"></i> <span>ราคาตัวแทน</span></a>
            <a href="/admin/promotions.html"><i class="fas fa-bullhorn"></i> <span>โปรโมชั่น</span></a>
            <a href="/admin/gallery.html"><i class="fas fa-images"></i> <span>แกลเลอรี่</span></a>
            <a href="/admin/reviews.html"><i class="fas fa-star"></i> <span>รีวิว Google</span></a>
            <a href="/admin/change-password.html" class="active"><i class="fas fa-key"></i> <span>เปลี่ยนรหัสผ่าน</span></a>
            <a href="../" target="_blank"><i class="fas fa-external-link-alt"></i> <span>ดูเว็บไซต์</span></a>
        </nav>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> <span>ออกจากระบบ</span></button>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2><i class="fas fa-key" style="color:#00d4ff"></i> เปลี่ยนรหัสผ่าน</h2>
        </div>

        <div class="settings-section">
            <h3><i class="fas fa-lock"></i> รหัสผ่านผู้ดูแลระบบ</h3>
            <form id="pw-form" autocomplete="off">
                <div class="form-group">
                    <label>รหัสผ่านปัจจุบัน</label>
                    <div class="pw-wrap">
                        <input type="password" id="current-pw" autocomplete="current-password" required>
                        <button type="button" class="pw-toggle" data-target="current-pw"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>รหัสผ่านใหม่</label>
                    <div class="pw-wrap">
                        <input type="password" id="new-pw" autocomplete="new-password" required>
                        <button type="button" class="pw-toggle" data-target="new-pw"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="pw-hint">อย่างน้อย 8 ตัวอักษร</div>
                </div>
                <div class="form-group">
                    <label>ยืนยันรหัสผ่านใหม่</label>
                    <div class="pw-wrap">
                        <input type="password" id="confirm-pw" autocomplete="new-password" required>
                        <button type="button" class="pw-toggle" data-target="confirm-pw"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="field-error" id="confirm-error">รหัสผ่านใหม่ทั้งสองช่องไม่ตรงกัน</div>
                </div>
                <button type="submit" class="btn btn-primary" id="save-btn"><i class="fas fa-save"></i> บันทึกรหัสผ่านใหม่</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const API = '/api';

    // ---- Auth guard (เหมือนหน้า admin อื่น) ----
    (async function(){
        try {
            const r = await fetch(API + '/admin-auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'check' }),
                credentials: 'include'
            });
            const d = await r.json();
            if (!d.authenticated) location.href = 'index.html';
        } catch(e) { location.href = 'index.html'; }
    })();

    async function doLogout() {
        await fetch(API + '/admin-auth.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'logout' }),
            credentials: 'include'
        });
        location.href = 'index.html';
    }

    // ---- show/hide password toggles ----
    document.querySelectorAll('.pw-toggle').forEach(function(btn){
        btn.addEventListener('click', function(){
            const input = document.getElementById(btn.dataset.target);
            const icon = btn.querySelector('i');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        });
    });

    function showToast(msg, type){
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show ' + type;
        setTimeout(function(){ t.className = 'toast ' + type; }, 3500);
    }

    // ---- submit ----
    document.getElementById('pw-form').addEventListener('submit', async function(e){
        e.preventDefault();
        const current = document.getElementById('current-pw').value;
        const next = document.getElementById('new-pw').value;
        const confirm = document.getElementById('confirm-pw').value;
        const confirmErr = document.getElementById('confirm-error');
        const btn = document.getElementById('save-btn');

        confirmErr.style.display = 'none';

        if (next.length < 8) { showToast('รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัวอักษร', 'error'); return; }
        if (next !== confirm) { confirmErr.style.display = 'block'; return; }
        if (next === current) { showToast('รหัสผ่านใหม่ต้องไม่ซ้ำกับรหัสผ่านเดิม', 'error'); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';

        try {
            const r = await fetch(API + '/admin-auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'change_password',
                    current_password: current,
                    new_password: next
                }),
                credentials: 'include'
            });
            const d = await r.json();
            if (d.success) {
                showToast('เปลี่ยนรหัสผ่านสำเร็จ!', 'success');
                document.getElementById('pw-form').reset();
            } else {
                showToast(d.error || 'เกิดข้อผิดพลาด', 'error');
            }
        } catch(err) {
            showToast('เชื่อมต่อไม่สำเร็จ กรุณาลองใหม่', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> บันทึกรหัสผ่านใหม่';
        }
    });
    </script>
</body>
</html>
